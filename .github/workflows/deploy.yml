name: Build and deploy GH Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and verify the deployment via id-token
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Pinned Zola version (the previous action tracked latest)
      ZOLA_VERSION: "0.22.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Zola
        run: |
          curl -fsSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/

      - name: Configure Pages
        uses: actions/configure-pages@v6

      # CSS (static/css/main.css) is pre-built and committed; we only run Zola.
      - name: Build site
        run: zola build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
